<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <title>Equipment Recommendations - Krushi Rent AI</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }
        .header { background: #2e7d32; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .form-card { background: white; padding: 30px; border-radius: 10px; }
        .form-group { margin: 20px 0; position: relative; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        .search-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .search-input:focus { outline: none; border-color: #4caf50; }
        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-top: none; border-radius: 0 0 5px 5px; max-height: 200px; overflow-y: auto; z-index: 1000; display: none; }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .suggestion-item:hover { background: #f5f5f5; }
        .suggestion-item:last-child { border-bottom: none; }
        .btn { background: #4caf50; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        .btn:hover { background: #45a049; }
        .back-link { color: #2e7d32; text-decoration: none; }
        input[type="number"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        input[type="number"]:focus { outline: none; border-color: #4caf50; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 AI Equipment Recommendations</h1>
        <a href="/farmer_dashboard" class="back-link">← Dashboard</a>
    </div>
    
    <div class="container">
        <div class="form-card">
            <h2>Enter Your Farm Details</h2>
            <form method="POST" id="recommendForm">
                <div class="form-group">
                    <label>Crop Name:</label>
                    <input type="text" name="crop" id="cropInput" class="search-input" placeholder="Type crop name (rice, wheat, cotton...)" required autocomplete="off">
                    <div id="cropSuggestions" class="suggestions"></div>
                </div>
                
                <div class="form-group">
                    <label>Crop Season:</label>
                    <input type="text" name="season" id="seasonInput" class="search-input" placeholder="Type season (kharif, rabi, zaid...)" required autocomplete="off">
                    <div id="seasonSuggestions" class="suggestions"></div>
                </div>
                
                <div class="form-group">
                    <label>Land Area (in acres):</label>
                    <input type="number" name="land_area" step="0.1" min="0.1" required>
                </div>
                
                <div class="form-group">
                    <label>Soil Type:</label>
                    <input type="text" name="soil_type" id="soilInput" class="search-input" placeholder="Type soil type (black, red, sandy...)" required autocomplete="off">
                    <div id="soilSuggestions" class="suggestions"></div>
                </div>
                
                <div class="form-group">
                    <label>Farming Activity:</label>
                    <input type="text" name="activity" id="activityInput" class="search-input" placeholder="Type activity (ploughing, sowing, irrigation...)" required autocomplete="off">
                    <div id="activitySuggestions" class="suggestions"></div>
                </div>
                
                <button type="submit" class="btn">🔍 Get AI Recommendations</button>
            </form>
        </div>
    </div>

    <script>
        // Data for autocomplete suggestions
        const suggestions = {
            crop: ['rice', 'wheat', 'cotton', 'maize', 'sugarcane', 'barley', 'soybean', 'groundnut', 'sunflower', 'mustard'],
            season: ['kharif', 'rabi', 'zaid', 'monsoon', 'winter', 'summer'],
            soil: ['black', 'red', 'sandy', 'clay', 'loamy', 'alluvial', 'laterite'],
            activity: ['ploughing', 'sowing', 'irrigation', 'harvesting', 'weeding', 'fertilizing', 'spraying']
        };

        // Setup autocomplete for each input
        setupAutocomplete('cropInput', 'cropSuggestions', suggestions.crop);
        setupAutocomplete('seasonInput', 'seasonSuggestions', suggestions.season);
        setupAutocomplete('soilInput', 'soilSuggestions', suggestions.soil);
        setupAutocomplete('activityInput', 'activitySuggestions', suggestions.activity);

        function setupAutocomplete(inputId, suggestionsId, dataArray) {
            const input = document.getElementById(inputId);
            const suggestionsDiv = document.getElementById(suggestionsId);
            
            input.addEventListener('input', function() {
                const value = this.value.toLowerCase().trim();
                
                if (value.length === 0) {
                    hideSuggestions(suggestionsDiv);
                    return;
                }
                
                const filtered = dataArray.filter(item => 
                    item.toLowerCase().includes(value)
                );
                
                showSuggestions(suggestionsDiv, filtered, input);
            });
            
            input.addEventListener('blur', function() {
                // Delay hiding to allow click on suggestions
                setTimeout(() => hideSuggestions(suggestionsDiv), 200);
            });
            
            input.addEventListener('focus', function() {
                if (this.value.trim().length > 0) {
                    const value = this.value.toLowerCase().trim();
                    const filtered = dataArray.filter(item => 
                        item.toLowerCase().includes(value)
                    );
                    showSuggestions(suggestionsDiv, filtered, input);
                }
            });
        }
        
        function showSuggestions(suggestionsDiv, items, input) {
            if (items.length === 0) {
                hideSuggestions(suggestionsDiv);
                return;
            }
            
            let html = '';
            items.forEach(item => {
                html += `<div class="suggestion-item" onclick="selectSuggestion('${input.id}', '${item}', '${suggestionsDiv.id}')">${item}</div>`;
            });
            
            suggestionsDiv.innerHTML = html;
            suggestionsDiv.style.display = 'block';
        }
        
        function hideSuggestions(suggestionsDiv) {
            suggestionsDiv.style.display = 'none';
        }
        
        function selectSuggestion(inputId, value, suggestionsId) {
            document.getElementById(inputId).value = value;
            hideSuggestions(document.getElementById(suggestionsId));
        }
        
        // Hide suggestions when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.classList.contains('search-input') && !e.target.classList.contains('suggestion-item')) {
                document.querySelectorAll('.suggestions').forEach(div => {
                    hideSuggestions(div);
                });
            }
        });
        
        // Handle form submission
        document.getElementById('recommendForm').addEventListener('submit', function(e) {
            // Validate that all required fields are filled
            const requiredInputs = this.querySelectorAll('input[required]');
            let allValid = true;
            
            requiredInputs.forEach(input => {
                if (!input.value.trim()) {
                    allValid = false;
                    input.style.borderColor = '#f44336';
                } else {
                    input.style.borderColor = '#ddd';
                }
            });
            
            if (!allValid) {
                e.preventDefault();
                alert('Please fill all required fields');
            }
        });
    </script>
</body>
</html>
